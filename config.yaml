seed: 42
device: cuda
num_runs: 1

dataset:
  name: cora
  root: data
  normalize: true      # Set to false for heterophilous datasets (e.g. roman-empire)

noise:
  type: £[uniform]           # uniform, gaussian, or feature_mask
  rate: 0.2
  seed: 42

model:
  name: gcn
  hidden_channels: 16
  n_layers: 3
  dropout: 0.2
  self_loop: true
  use_residual: false  # Set to true for heterophilous datasets (e.g. roman-empire)
  mlp_layers: 1
  train_eps: false
  heads: 8
  use_pe: false
  pe_dim: 8

training:
  method: gcod
  # method: gcod
  lr: 0.001
  weight_decay: 5e-4
  epochs: 1500          # keep low for local runs
  patience: 300
  oversmoothing_every: 1  # must be <= epochs to avoid NaN metrics
  mode: transductive   # transductive or inductive
  # batch_size: 512    # uncomment to enable mini-batch processing
  # sampler: neighbor   # neighbor, cluster, graphsaint, or random_node
  # sampler_params:     # sampler-specific parameters
  #   num_neighbors: [15, 10]

positive_eigenvalues_params:
  batch_size: 32

gcod_params:
  batch_size: 64
  uncertainty_lr: 0.001     # u needs to adapt quickly to separate clean/noisy samples
  kl_start_epoch: 2    # Delay KL activation to allow initial stabilization
  momentum: 0          # No centroid momentum (correction mode uses margin-based filtering)
  temperature: 1       # Soften distributions in L3 loss
  similarity_mode: correction  # 'correction' (label correction via centroids) or 'discount' (original)

nrgnn_params:
  edge_hidden: 16
  n_p: 2              # reduced from 10
  p_u: 0.7
  alpha: 0.05
  beta: 1.0
  t_small: 0.1
  n_n: 5              # reduced from 50

pi_gnn_params:
  start_epoch: 1      # must be < epochs to exercise MI path
  miself: false
  norm: null
  vanilla: false

cr_gnn_params:
  T: 2
  tau: 0.6
  p: 0.9
  alpha: 0.2
  beta: 0.9
  pr: 0.3

community_defense_params:
  community_method: louvain
  num_communities: null
  lambda_comm: 1.0
  pos_weight: 2.0
  neg_weight: 2.0
  margin: 1.5
  num_neg_samples: 3

rtgnn_params:
  edge_hidden: 16
  co_lambda: 0.1
  alpha: 0.3
  th: 0.8
  K: 3              # reduced from 50
  tau: 0.05
  n_neg: 10         # reduced from 100

graphcleaner_params:
  k: 5
  sample_rate: 0.5
  max_iter_classifier: 50  # reduced from 5000
  held_split: valid

unionnet_params:
  k: 10
  alpha: 0.5
  beta: 1
  feat_norm: true

gnn_cleaner_params:
  label_propagation_iterations: 5  # reduced from 50
  similarity_epsilon: 1e-8

erase_params:
  n_embedding: 32     # reduced from 512
  n_heads: 8
  use_layer_norm: false
  use_residual: false
  use_residual_linear: false
  gam1: 1.0
  gam2: 2.0
  eps: 0.05
  alpha: 0.6
  beta: 0.6
  T: 3

gnnguard_params:
  P0: 0.5
  K: 2
  D2: 16
  attention: true
