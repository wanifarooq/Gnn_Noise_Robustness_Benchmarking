# dblp — GCN_modified (tunedGNN strong baseline, arXiv:2406.08993).
# Separate backbone (learned linear residual + pre_linear + LN/BN). All 13 methods x noise sweep.
# NOTE: hidden=256 full-batch can be memory-heavy on dense graphs — use a >=24GB GPU.
# Run:  python main.py -c configs/dblp_gcn_modified.yaml
seed: 42
device: cuda
num_runs: 3

dataset:
  name: dblp
  root: data
  normalize: true

noise:
  type: £[clean, uniform, pair]
  rate: 0.3
  seed: 42

model:
  name: gcn_modified
  hidden_channels: 256
  n_layers: 3
  dropout: 0.5
  self_loop: true
  # --- GCN_modified (MPNNs) knobs ---
  pre_linear: false     # project features before message passing
  lin_res: true        # learned linear residual conv(x)+W_i*x (key for heterophily)
  mod_norm: ln         # none|ln|bn (per-layer normalization)
  jk: false              # additive jumping-knowledge (bool)
  pre_ln: false
  inner_gnn: gcn          # gcn|gat|sage (inner conv type)
  heads: 1

training:
  method: £[standard, positive_eigenvalues, gcod, nrgnn, pi_gnn, cr_gnn, community_defense, rtgnn, graphcleaner, unionnet, gnn_cleaner, erase, gnnguard]
  lr: 0.001
  weight_decay: 5e-4
  epochs: 1000
  patience: 300
  oversmoothing_every: 50
  mode: transductive

positive_eigenvalues_params:
  batch_size: 32          # unused (PE is full-batch now); kept for back-compat

gcod_params:
  batch_size: 64
  uncertainty_lr: 0.001
  kl_start_epoch: 2
  momentum: 0.9
  temperature: 1.0
  similarity_mode: correction

nrgnn_params:
  edge_hidden: 16
  n_p: 50                 # paper default; NOTE: NRGNN builds O(|unlabeled|x|confident|)
  p_u: 0.8                # edges -> can OOM/oversmooth on large/dense graphs (a finding)
  alpha: 0.03
  beta: 1.0
  t_small: 0.1
  n_n: 50

pi_gnn_params:
  start_epoch: 50         # warm up MI model before masking (fraction of epochs)
  miself: false
  norm: null
  vanilla: false

cr_gnn_params:
  T: 2
  tau: 0.5
  p: 0.8
  alpha: 0.2
  beta: 0.2
  pr: 0.3

community_defense_params:
  community_method: louvain
  num_communities: null
  lambda_comm: 1.0

rtgnn_params:
  edge_hidden: 64
  co_lambda: 0.1
  alpha: 1.0
  th: 0.8
  K: 50
  tau: 0.05
  n_neg: 100
  decay_w: 0.1

graphcleaner_params:
  k: 5
  sample_rate: 0.5
  max_iter_classifier: 200
  held_split: valid

unionnet_params:
  k: 10
  alpha: 0.5
  beta: 1
  feat_norm: true

gnn_cleaner_params:
  label_propagation_iterations: 50
  similarity_epsilon: 1e-8

erase_params:
  n_embedding: 256
  n_heads: 8
  use_layer_norm: false
  use_residual: false
  use_residual_linear: false
  gam1: 1.0
  gam2: 2.0
  eps: 0.05
  alpha: 0.6
  beta: 0.6
  T: 3

gnnguard_params:
  P0: 0.5
  K: 2
  D2: 16
  attention: true
