seed: 42
device: cuda
num_runs: 3

dataset:
  name: amazon-ratings  # roman-empire is a heterophilous dataset
  root: data
  normalize: False      # Set to false for heterophilous datasets (e.g. roman-empire)

noise:
  type: clean          # uniform, gaussian, or feature_mask
  rate: 0.0
  seed: 42

model:
  name: SheafNN
  hidden_channels: 256
  n_layers: 4
  dropout_in: 0.2
  dropout: 0.5
  normalization: batch
  stalk : 4
  non_linear: True
  ego: True
  attention : True


training:
  method: SheafNN_Trainer #sheaf_graphcleaner
  checkpoint_every_epoch: False
  lr: 0.005
  weight_decay: 5.0e-4
  epochs: 3500         # keep low for local runs
  patience: 500
  oversmoothing_every: 50  # must be <= epochs to avoid NaN metrics
  mode: transductive   # transductive or inductive
  # batch_size: 512    # uncomment to enable mini-batch processing
  # sampler: neighbor   # neighbor, cluster, graphsaint, or random_node
  # sampler_params:     # sampler-specific parameters
  #   num_neighbors: [15, 10]

graphcleaner_params:
  k: 5
  sample_rate: 0.5
  max_iter_classifier: 1000  # reduced from 5000
  held_split: valid